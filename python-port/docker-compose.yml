services:
  backend:
    build:
      context: ./backend
    expose:
      - "80"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/api/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  proxy:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    environment:
      BACKEND_ORIGIN: http://backend:80
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
